name: Weekly paper-trade email

# Cloud-side delivery of the weekly paper-trade report, independent of the basement PC.
# Emails the last COMMITTED paper_state.json / digest.json (email_report.py does no data
# refresh of its own), so even if the basement is down you still get the last-known state.
# Secret required: GMAIL_APP_PASSWORD (repo Settings -> Secrets and variables -> Actions).

on:
  schedule:
    - cron: "0 8 * * 1"      # Mondays 08:00 UTC (schedule runs from the default branch only)
  workflow_dispatch: {}       # manual "Run workflow" button for a one-off test send

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4        # ubuntu-latest ships python3; email_report.py is stdlib-only
      - name: Send weekly report
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          test -n "$GMAIL_APP_PASSWORD" || { echo "::error::GMAIL_APP_PASSWORD secret is not set"; exit 1; }
          python3 email_report.py
